services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rumbo_user
      POSTGRES_PASSWORD: rumbo_pass
      POSTGRES_DB: rumbo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rumbo_user -d rumbo_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://rumbo_user:rumbo_pass@postgres:5432/rumbo_db
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-in-production-minimum-length}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  migrations:
    build: ./backend
    command: python -m alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://rumbo_user:rumbo_pass@postgres:5432/rumbo_db
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-in-production-minimum-length}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
