# Render Blueprint — solo static site (gratuito)
# El backend requiere plan pagado en Render.
# Para deploy 100% gratuito ver docs/DEPLOY_FREE.md

services:
  - type: web
    name: rumbo-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "22"
